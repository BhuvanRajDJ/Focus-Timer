appId: com.focustimer.app
productName: Focus Timer
publish:
  provider: github
  owner: focus-timer-org
  repo: focus-timer
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
  - resources/**/*
  - A_Steady_Ascent.mp3
win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  # Code-signing intentionally omitted (out of scope). Unsigned build => Windows
  # SmartScreen "unknown publisher" warning on first run. See DELIVERY.md.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Focus Timer
artifactName: ${productName}-${version}-Setup.${ext}
